{% extends "base.html" %} {% block title %}TechFix — Вхід{% endblock %} {% block
body %}
<div class="page-wrapper">
  <div class="panel">
    <div class="panel-corner tl"></div>
    <div class="panel-corner tr"></div>
    <div class="panel-corner bl"></div>
    <div class="panel-corner br"></div>

    <div class="panel-header">
      <div class="logo-icon">&#9670;</div>
      <div class="panel-title">TechFix</div>
      <div class="panel-subtitle">Авторизація / Auth</div>
    </div>

    <div class="status-bar">
      <span class="status-dot"></span>
      Система онлайн — очікує ідентифікації
    </div>

    {% if error %}
    <div class="alert alert-error">
      <span class="alert-icon">&#x26A0;</span>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    <form action="/login" method="post">
      <div class="form-group">
        <label class="form-label" for="username">Логін</label>
        <input
          class="form-control"
          type="text"
          id="username"
          name="username"
          placeholder="user_handle"
          autocomplete="username"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Пароль</label>
        <input
          class="form-control"
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit" class="btn mt-1">
        <span>Увійти до системи</span>
      </button>
    </form>

    <div class="divider">або</div>

    <p class="text-center">
      <span
        style="
          font-family: var(--font-mono);
          font-size: 0.72rem;
          color: var(--text-muted);
        "
      >
        Немає акаунту?
      </span>
      <a href="/register" class="link" style="margin-left: 0.4rem"
        >Реєстрація</a
      >
    </p>
  </div>
</div>
{% endblock %}
