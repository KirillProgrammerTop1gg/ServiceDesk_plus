{% extends "base.html" %} {% block title %}TechFix — Реєстрація{% endblock %} {%
block body %}
<div class="page-wrapper">
  <div class="panel">
    <div class="panel-corner tl"></div>
    <div class="panel-corner tr"></div>
    <div class="panel-corner bl"></div>
    <div class="panel-corner br"></div>

    <div class="panel-header">
      <div class="logo-icon">&#9670;</div>
      <div class="panel-title">TechFix</div>
      <div class="panel-subtitle">Новий обліковий запис</div>
    </div>

    <div class="status-bar">
      <span class="status-dot"></span>
      Реєстрація нового користувача
    </div>

    {% if error %}
    <div class="alert alert-error">
      <span class="alert-icon">&#x26A0;</span>
      <span>{{ error }}</span>
    </div>
    {% endif %} {% if message %}
    <div class="alert alert-success">
      <span class="alert-icon">&#x2713;</span>
      <span>{{ message }}</span>
    </div>
    {% endif %}

    <form action="/register" method="post">
      <div class="form-group">
        <label class="form-label" for="username">Логін</label>
        <input
          class="form-control"
          type="text"
          id="username"
          name="username"
          placeholder="придумайте логін"
          autocomplete="username"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input
          class="form-control"
          type="email"
          id="email"
          name="email"
          placeholder="your@email.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Пароль</label>
        <input
          class="form-control"
          type="password"
          id="password"
          name="password"
          placeholder="мінімум 8 символів"
          autocomplete="new-password"
          required
        />
      </div>

      <button type="submit" class="btn btn-green mt-1">
        <span>Створити акаунт</span>
      </button>
    </form>

    <div class="divider">або</div>

    <p class="text-center">
      <span
        style="
          font-family: var(--font-mono);
          font-size: 0.72rem;
          color: var(--text-muted);
        "
      >
        Вже є акаунт?
      </span>
      <a href="/login" class="link" style="margin-left: 0.4rem">Увійти</a>
    </p>
  </div>
</div>
{% endblock %}
