server {
    listen 80;
    server_name localhost;

    # Root folder with compiled React SPA
    root /app/dist;
    index index.html;

    # Maximum file upload size (crucial for payment screenshots and problem photos)
    client_max_body_size 20M;

    # Gzip compression for high-performance asset delivery
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Serve built static assets with long cache life
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Handle React Router (SPA) routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the FastAPI backend
    location /api/ {
        # Trailing slash is important! It strips /api/ from the URL before forwarding to FastAPI
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Serve uploaded static media directly through Nginx (bypassing Python/Uvicorn)
    location /static/ {
        alias /app/static/;
        expires 7d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Custom 50x error page
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
